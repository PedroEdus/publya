name: Publya ETL → BigQuery

on:
  schedule:
    - cron: "0 8 * * 1-5"   # Seg–Sex às 08:00 UTC (05:00 Brasília)
  workflow_dispatch:          # Permite rodar manualmente pelo GitHub

jobs:
  etl:
    runs-on: ubuntu-latest

    env:
      GCP_PROJECT_ID:     ${{ secrets.GCP_PROJECT_ID }}
      BQ_DATASET_SILVER:  buriti_marketing_silver
      PUBLYA_CLIENT_ID_1: ${{ secrets.PUBLYA_CLIENT_ID_1 }}
      PUBLYA_TOKEN_1:     ${{ secrets.PUBLYA_TOKEN_1 }}
      PUBLYA_EMAIL_1:     ${{ secrets.PUBLYA_EMAIL_1 }}
      PUBLYA_CLIENT_ID_2: ${{ secrets.PUBLYA_CLIENT_ID_2 }}
      PUBLYA_TOKEN_2:     ${{ secrets.PUBLYA_TOKEN_2 }}
      PUBLYA_EMAIL_2:     ${{ secrets.PUBLYA_EMAIL_2 }}

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependências
        run: pip install -r etl/requirements.txt

      - name: Autenticar no Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Rodar ETL Publya
        run: python etl/publya_campanhas_bq.py
